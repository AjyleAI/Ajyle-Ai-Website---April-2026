<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 55" width="220" height="55">
  <defs>
    <linearGradient id="arcGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C853"/>
      <stop offset="100%" stop-color="#00A6FB"/>
    </linearGradient>
  </defs>

  <!-- Outer arc: ~300deg, gap at bottom-left (~7-8 o'clock) -->
  <circle
    cx="27.5" cy="27.5" r="23"
    fill="none"
    stroke="url(#arcGrad)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-dasharray="120.4 24.1"
    transform="rotate(210 27.5 27.5)"
  />

  <!-- Middle ring -->
  <circle
    cx="27.5" cy="27.5" r="13.5"
    fill="none"
    stroke="#00A6FB"
    stroke-width="3.5"
  />

  <!-- Centre dot -->
  <circle cx="27.5" cy="27.5" r="4.5" fill="#1C2D5C"/>

  <!-- Wordmark -->
  <text
    y="38"
    font-family="Montserrat, Arial Black, sans-serif"
    font-weight="800"
    font-size="30"
    letter-spacing="-0.5"
  >
    <tspan x="63" fill="#1C2D5C">Ajyle</tspan><tspan fill="#00A6FB">.</tspan><tspan fill="#1C2D5C">AI</tspan>
  </text>
</svg>
